version: 2
project_name: sncf-connect-pp-cli
changelog:
  disable: true
builds:
  - id: sncf-connect-pp-cli
    main: ./cmd/sncf-connect-pp-cli
    binary: sncf-connect-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/travel/sncf-connect/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: sncf-connect-pp-mcp
    main: ./cmd/sncf-connect-pp-mcp
    binary: sncf-connect-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: sncf-connect-pp-cli
    repository:
      owner: jmbernabotto
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "navitia.io is the open API for building cool stuff with mobility data."
    install: |
      bin.install "sncf-connect-pp-cli"
      bin.install "sncf-connect-pp-mcp"
