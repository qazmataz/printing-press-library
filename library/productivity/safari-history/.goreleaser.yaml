version: 2
project_name: safari-history-pp-cli
changelog:
  disable: true
builds:
  - id: safari-history-pp-cli
    main: ./cmd/safari-history-pp-cli
    binary: safari-history-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/productivity/safari-history/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: safari-history-pp-mcp
    main: ./cmd/safari-history-pp-mcp
    binary: safari-history-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: safari-history-pp-cli
    repository:
      owner: vinny-pasceri
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "Reverse-engineered from the hand-built safari-history-pp-cli command/data shape"
    install: |
      bin.install "safari-history-pp-cli"
      bin.install "safari-history-pp-mcp"
