version: 2
project_name: marianatek-pp-cli
changelog:
  disable: true
builds:
  - id: marianatek-pp-cli
    main: ./cmd/marianatek-pp-cli
    binary: marianatek-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/productivity/marianatek/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: marianatek-pp-mcp
    main: ./cmd/marianatek-pp-mcp
    binary: marianatek-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: marianatek-pp-cli
    repository:
      owner: salmonumbrella
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "Search Mariana Tek studio schedules, book classes, watch cancellations, and sync reservations into an offline class catalog."
    install: |
      bin.install "marianatek-pp-cli"
      bin.install "marianatek-pp-mcp"
