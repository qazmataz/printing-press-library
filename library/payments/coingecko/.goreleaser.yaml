version: 2
project_name: coingecko-pp-cli
changelog:
  disable: true
builds:
  - id: coingecko-pp-cli
    main: ./cmd/coingecko-pp-cli
    binary: coingecko-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/payments/coingecko/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: coingecko-pp-mcp
    main: ./cmd/coingecko-pp-mcp
    binary: coingecko-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: coingecko-pp-cli
    repository:
      owner: hiten-shah
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "Fetch CoinGecko cryptocurrency prices, market data, coins, exchanges, and trend endpoints from the public API."
    install: |
      bin.install "coingecko-pp-cli"
      bin.install "coingecko-pp-mcp"
