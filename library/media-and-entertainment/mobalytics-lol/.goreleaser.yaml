version: 2
project_name: mobalytics-lol-pp-cli
changelog:
  disable: true
builds:
  - id: mobalytics-lol-pp-cli
    main: ./cmd/mobalytics-lol-pp-cli
    binary: mobalytics-lol-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/media-and-entertainment/mobalytics-lol/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: mobalytics-lol-pp-mcp
    main: ./cmd/mobalytics-lol-pp-mcp
    binary: mobalytics-lol-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: mobalytics-lol-pp-cli
    repository:
      owner: quantumglitch
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "Every League of Legends aggregator, plus a local SQLite for cross-champion queries no single page surfaces."
    install: |
      bin.install "mobalytics-lol-pp-cli"
      bin.install "mobalytics-lol-pp-mcp"
