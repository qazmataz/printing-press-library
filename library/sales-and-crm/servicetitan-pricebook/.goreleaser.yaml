version: 2
project_name: servicetitan-pricebook-pp-cli
changelog:
  disable: true
builds:
  - id: servicetitan-pricebook-pp-cli
    main: ./cmd/servicetitan-pricebook-pp-cli
    binary: servicetitan-pricebook-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/sales-and-crm/servicetitan-pricebook/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: servicetitan-pricebook-pp-mcp
    main: ./cmd/servicetitan-pricebook-pp-mcp
    binary: servicetitan-pricebook-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: servicetitan-pricebook-pp-cli
    repository:
      owner: user
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "Sync ServiceTitan Pricebook services, materials, equipment, vendors, markups, warranties, and cost-drift audits."
    install: |
      bin.install "servicetitan-pricebook-pp-cli"
      bin.install "servicetitan-pricebook-pp-mcp"
