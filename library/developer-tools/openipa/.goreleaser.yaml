version: 2
project_name: openipa-pp-cli
changelog:
  disable: true
builds:
  - id: openipa-pp-cli
    main: ./cmd/openipa-pp-cli
    binary: openipa-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/developer-tools/openipa/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: openipa-pp-mcp
    main: ./cmd/openipa-pp-mcp
    binary: openipa-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: openipa-pp-cli
    repository:
      owner: aborruso
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "Search Italy's IndicePA for public administrations, PEC addresses, IPA codes, billing codes, and compliance details."
    install: |
      bin.install "openipa-pp-cli"
      bin.install "openipa-pp-mcp"
