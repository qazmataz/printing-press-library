version: 2
project_name: airframe-pp-cli
changelog:
  disable: true
builds:
  - id: airframe-pp-cli
    main: ./cmd/airframe-pp-cli
    binary: airframe-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/developer-tools/airframe/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: airframe-pp-mcp
    main: ./cmd/airframe-pp-mcp
    binary: airframe-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: airframe-pp-cli
    repository:
      owner: chris-drit
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "Build aircraft dossiers from FAA registry and NTSB records, with owner, fleet, model-safety, and accident-history searches."
    install: |
      bin.install "airframe-pp-cli"
      bin.install "airframe-pp-mcp"
