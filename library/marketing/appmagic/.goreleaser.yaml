version: 2
project_name: appmagic-pp-cli
changelog:
  disable: true
builds:
  - id: appmagic-pp-cli
    main: ./cmd/appmagic-pp-cli
    binary: appmagic-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/marketing/appmagic/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: appmagic-pp-mcp
    main: ./cmd/appmagic-pp-mcp
    binary: appmagic-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: appmagic-pp-cli
    repository:
      owner: qazmataz
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "Full AppMagic API coverage plus chart history, deltas, and entitlement maps."
    install: |
      bin.install "appmagic-pp-cli"
      bin.install "appmagic-pp-mcp"
