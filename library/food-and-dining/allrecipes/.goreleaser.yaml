version: 2
project_name: allrecipes-pp-cli
changelog:
  disable: true
builds:
  - id: allrecipes-pp-cli
    main: ./cmd/allrecipes-pp-cli
    binary: allrecipes-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/food-and-dining/allrecipes/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: allrecipes-pp-mcp
    main: ./cmd/allrecipes-pp-mcp
    binary: allrecipes-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: allrecipes-pp-cli
    repository:
      owner: trevin-chow
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "Search Allrecipes, fetch structured recipe data, scale servings, build grocery lists, and rank cached recipes by popularity."
    install: |
      bin.install "allrecipes-pp-cli"
      bin.install "allrecipes-pp-mcp"
