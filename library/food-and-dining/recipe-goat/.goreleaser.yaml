version: 2
project_name: recipe-goat-pp-cli
changelog:
  disable: true
builds:
  - id: recipe-goat-pp-cli
    main: ./cmd/recipe-goat-pp-cli
    binary: recipe-goat-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X recipe-goat-pp-cli/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: recipe-goat-pp-mcp
    main: ./cmd/recipe-goat-pp-mcp
    binary: recipe-goat-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: recipe-goat-pp-cli
    repository:
      owner: trevin-chow
      name: homebrew-tap
    homepage: "https://github.com/trevin-chow/recipe-goat-pp-cli"
    description: "Search trusted recipe sites, rank results, save a local cookbook, and enrich nutrition data with USDA FoodData Central."
    install: |
      bin.install "recipe-goat-pp-cli"
      bin.install "recipe-goat-pp-mcp"
