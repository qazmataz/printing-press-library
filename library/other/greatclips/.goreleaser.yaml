version: 2
project_name: greatclips-pp-cli
changelog:
  disable: true
builds:
  - id: greatclips-pp-cli
    main: ./cmd/greatclips-pp-cli
    binary: greatclips-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/other/greatclips/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: greatclips-pp-mcp
    main: ./cmd/greatclips-pp-mcp
    binary: greatclips-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: greatclips-pp-cli
    repository:
      owner: greatclips
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "Check Great Clips salon wait times, prepare Online Check-In requests, inspect route shapes, and track local wait history."
    install: |
      bin.install "greatclips-pp-cli"
      bin.install "greatclips-pp-mcp"
