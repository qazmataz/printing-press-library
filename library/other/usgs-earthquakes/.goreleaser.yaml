version: 2
project_name: usgs-earthquakes-pp-cli
changelog:
  disable: true
builds:
  - id: usgs-earthquakes-pp-cli
    main: ./cmd/usgs-earthquakes-pp-cli
    binary: usgs-earthquakes-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/other/usgs-earthquakes/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: usgs-earthquakes-pp-mcp
    main: ./cmd/usgs-earthquakes-pp-mcp
    binary: usgs-earthquakes-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: usgs-earthquakes-pp-cli
    repository:
      owner: trevin-chow
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "Every USGS earthquake feed and event query in one terminal, with offline SQLite cache, agent-native output, and a..."
    install: |
      bin.install "usgs-earthquakes-pp-cli"
      bin.install "usgs-earthquakes-pp-mcp"
