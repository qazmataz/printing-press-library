version: 2
project_name: edgar-pp-cli
changelog:
  disable: true
builds:
  - id: edgar-pp-cli
    main: ./cmd/edgar-pp-cli
    binary: edgar-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/other/edgar/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: edgar-pp-mcp
    main: ./cmd/edgar-pp-mcp
    binary: edgar-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: edgar-pp-cli
    repository:
      owner: magoo242
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "Fetch SEC EDGAR filings, insider activity, XBRL facts, and cached filing search results with agent-friendly output."
    install: |
      bin.install "edgar-pp-cli"
      bin.install "edgar-pp-mcp"
